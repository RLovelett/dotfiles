#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = uwsm app -- hypridle
exec-once = uwsm app -- waybar
exec-once = uwsm app -- 1password --silent
exec-once = uwsm app -- hyprpaper
exec-once = uwsm app -- walker --gapplication-service
exec-once = uwsm app -- swayosd-server

# Maybe? Copied from Omarchy
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1)
exec-once = dbus-update-activation-environment --systemd --all

# GTK theme
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Colloid-Dark-Dracula'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface font-name 'MesloLGSDZ Nerd Font Mono 12'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Colloid-Dracula-Dark'
