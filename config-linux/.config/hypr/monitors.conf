# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Explicit monitor layout: DP-2 (left), HDMI-A-1 (right)
monitor = DP-2,     preferred, 0x0,    1.25, bitdepth, 10, vrr, 1
monitor = HDMI-A-1, preferred, auto-right, 1.25, bitdepth, 10

# Catch-all for any other connected displays
monitor= ,preferred,auto,1.25,bitdepth,10,vrr,1

# Pin odd workspaces to left monitor (DP-2), even to right (HDMI-A-1)
workspace = 1,  monitor:DP-2,     default:true
workspace = 2,  monitor:HDMI-A-1, default:true
workspace = 3,  monitor:DP-2
workspace = 4,  monitor:HDMI-A-1
workspace = 5,  monitor:DP-2
workspace = 6,  monitor:HDMI-A-1
workspace = 7,  monitor:DP-2
workspace = 8,  monitor:HDMI-A-1
workspace = 9,  monitor:DP-2
workspace = 10, monitor:HDMI-A-1

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.6

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# Or for ultrawide monitors like 34" 3440x1440 or 49" 5120x1440
# env = GDK_SCALE,1
# monitor=,preferred,auto,1

# Portrait/rotated secondary monitor (transform: 1 = 90°, 3 = 270°)
# monitor = DP-2, preferred, auto, 1, transform, 1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2

xwayland {
  force_zero_scaling = true
  use_nearest_neighbor = false
  enabled = true
}

