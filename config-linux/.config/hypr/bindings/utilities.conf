# Modifier key conventions:
#   SUPER + letter            Window/workspace actions (see tiling-v2.conf)
#   SUPER SHIFT + letter      Application launchers
#   SUPER CTRL + letter       System/control panels and menus
#   SUPER ALT + letter        Window variants / secondary actions
#
# Special keys (intentional exceptions to the letter convention):
#   SUPER + SPACE             Launch apps (walker)
#   SUPER + ESCAPE            System menu (walker)

# Application launchers
bindd = SUPER SHIFT, RETURN,     Terminal,               exec, uwsm app -- xdg-terminal-exec --dir="$(hyprland-cmd-terminal-cwd)" -e tmux new-session -A -s default -n default
bindd = SUPER SHIFT ALT, RETURN, Terminal (new session), exec, uwsm app -- xdg-terminal-exec --dir="$(hyprland-cmd-terminal-cwd)" -e tmux new-session
bindd = SUPER SHIFT, B,          Browser,                exec, hyprland-launch-browser
bindd = SUPER SHIFT ALT, B,      Browser (private),      exec, hyprland-launch-browser --private
bindd = SUPER SHIFT, E,          Neovim,                 exec, hyprland-launch-tui "nvim"
bindd = SUPER SHIFT, F,          File manager,           exec, uwsm app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F,      File manager (cwd),     exec, uwsm app -- nautilus --new-window "$(hyprland-cmd-terminal-cwd)"
bindd = SUPER SHIFT, G,          Signal,                 exec, hyprland-launch-or-focus ^signal$ "uwsm-app -- signal-desktop --password-store=gnome-libsecret"
bindd = SUPER SHIFT, O,          Obsidian,               exec, hyprland-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W,          Typora,                 exec, uwsm app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH,      1Password,              exec, uwsm app -- 1password

# Menus (SUPER CTRL + letter)
bindd = SUPER, SPACE,   Launch apps,       exec, walker --width 644 --maxheight 300 --minheight 300
bindd = SUPER, ESCAPE,  System menu,       exec, walker --width 644 --maxheight 300 --minheight 300 --provider "menus:system"
bindd = SUPER CTRL, E,  Emoji picker,      exec, walker --width 644 --maxheight 300 --minheight 300 --provider symbols
bindd = SUPER CTRL, S,  Snippets,          exec, walker --width 644 --maxheight 300 --minheight 300 --provider snippets
bindd = SUPER CTRL, V,  Clipboard manager, exec, walker --width 644 --maxheight 300 --minheight 300 --provider clipboard
bindd = SUPER CTRL, P,  Wallpapers,        exec, walker --width 900 --maxheight 900 --minheight 500 --provider "menus:wallpaper"
bindd = SUPER CTRL, K,  Show key bindings, exec, walker --width 800 --maxheight 900 --minheight 300 --provider "menus:keybindings"

# Notifications
bindd = SUPER CTRL, N,      Toggle notifications panel, exec, swaync-client --toggle-panel
bindd = SUPER SHIFT, N,     Toggle do not disturb,      exec, swaync-client --toggle-dnd
bindd = SUPER ALT, N,       Dismiss last notification,  exec, swaync-client --close-latest
bindd = SUPER SHIFT ALT, N, Dismiss all notifications,  exec, swaync-client --close-all
#bindd = SUPER CTRL, N,      Invoke last notification,   exec, swaync-client --action 0

# Captures
bindd = , PRINT, Screenshot (region), exec, hyprshot -m region
bindd = SHIFT, PRINT, Screenshot (window),  exec, hyprshot -m window
bindd = CTRL, PRINT, Screenshot (output),  exec, hyprshot -m output
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a

# Waybar-less information
bindd = SUPER CTRL ALT, T, Show time, exec, notify-send "    $(date +"%A %H:%M  —  %d %B W%V %Y")"

# Control panels
bindd = SUPER CTRL, A, Audio controls,  exec, hyprland-launch-audio
bindd = SUPER CTRL, B, Bluetooth,       exec, hyprland-launch-bluetooth
bindd = SUPER CTRL, I, System info,     exec, hyprland-launch-fastfetch
bindd = SUPER CTRL, T, Activity,        exec, hyprland-launch-tui btop
bindd = SUPER CTRL, W, Wifi controls,   exec, hyprland-launch-wifi

# Zoom
bindd = SUPER CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = SUPER CTRL ALT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1

