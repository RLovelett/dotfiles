# Refer to https://wiki.hyprland.org/Configuring/Variables/

source = ~/.config/hypr/dracula_colors.conf

# Variables
$activeBorderColor = rgba(33ccffee) rgba(00ff99ee) 45deg
$inactiveBorderColor = rgba(595959aa)

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 4
    gaps_out = 8

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = $purple
    col.inactive_border = rgba(44475aaa)
    col.nogroup_border = rgba(282a36dd)
    col.nogroup_border_active = $purple

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 60
        offset = 1 2
        render_power = 3
        scale = 0.97
        color = $shadow
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 10
        passes = 3
        ignore_opacity = true

        noise = 0.08
        contrast = 1.5

        xray = false
        new_optimizations = true
    }
}

# https://wiki.hypr.land/Configuring/Variables/#group
group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
    col.border_locked_active = -1
    col.border_locked_inactive = -1

    groupbar {
        font_size = 12
        font_family = monospace
        font_weight_active = ultraheavy
        font_weight_inactive = normal

        indicator_height = 0
        indicator_gap = 5
        height = 22
        gaps_in = 5
        gaps_out = 0

        text_color = rgb(ffffff)
        text_color_inactive = rgba(ffffff90)
        col.active = rgba(00000040)
        col.inactive = rgba(00000020)

        gradients = true
        gradient_rounding = 0
        gradient_round_only_edges = false
    }
}


# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Bezier curves, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = softSnap, 0.4, 0, 0.2, 1
    bezier = fluent, 0.0, 0.0, 0.2, 1.0

    # Windows
    animation = windows, 1, 5, overshot, popin 80%
    animation = windowsIn, 1, 5, overshot, popin 80%
    animation = windowsOut, 1, 4, smoothOut, popin 95%
    animation = windowsMove, 1, 4, softSnap

    # Layers
    animation = layersIn, 1, 3, smoothIn, slide right
    animation = layersOut, 1, 2, softSnap, slide right

    # Fade
    animation = fade, 1, 4, smoothIn
    animation = fadeIn, 1, 4, smoothIn
    animation = fadeOut, 1, 4, smoothOut
    animation = fadeSwitch, 1, 4, smoothIn
    animation = fadeShadow, 1, 4, smoothIn
    animation = fadeDim, 1, 4, smoothIn
    animation = fadeDpms, 1, 4, smoothIn

    # Workspaces
    animation = workspaces, 1, 5, overshot, slidefade 30%
    animation = specialWorkspace, 1, 5, overshot, slidefadevert 30%
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
    force_split = 2 # Always split on the right
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    disable_hyprland_logo = true
    disable_splash_rendering  = true
    focus_on_activate = true
    anr_missed_pings = 3
    on_focus_under_fullscreen = 1
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    vfr = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# https://wiki.hypr.land/Configuring/Variables/#cursor
cursor {
    hide_on_key_press = true
    warp_on_change_workspace = 1
}

# Auto toggle scratchpad on switching workspace from scratchpad
binds {
    hide_special_on_workspace_change = true
}
